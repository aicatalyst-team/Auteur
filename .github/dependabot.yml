version: 2

# 自动跟踪上游依赖更新,每周一早上给仓库提 PR 升级版本。
# 不必每个 PR 都合,但能让你知道「哦 Spring Boot 出了 3.4 了 / Vue 3.5.x 又升小版本了」。

updates:
  # Maven (backend)
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # npm (frontend)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # npm (renderer)
  - package-ecosystem: npm
    directory: /renderer
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - renderer
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Docker base images (backend / frontend Dockerfiles)
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
      include: scope
