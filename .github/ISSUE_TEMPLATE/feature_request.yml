name: 💡 功能建议
description: 提议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提议!提交前请先确认:
        1. 已经搜过现有 issue 没人提过类似建议
        2. 不是「能不能换个 X 框架」这种大重构(那种先开 Discussion 讨论)

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 描述当前流程哪里不爽,而不是直接提解决方案
      placeholder: 「批量出图时如果某张失败,后续整批都得重跑」
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的提议
      description: 怎么解决?可以多个候选方案
      placeholder: 「失败的镜头单独标记,只重跑失败那几张」
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 其他可能的做法?为什么你选上面那个?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 涉及的层
      multiple: true
      options:
        - Backend (Spring Boot / 16 角色 / Agent)
        - Frontend (Vue / 工作台 / Chat UI)
        - Renderer (Remotion)
        - Extension (Chrome 扩展)
        - Docker / 部署
        - 文档 / 示例
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充
      description: 参考资料、类似项目的做法、willing to PR 等
